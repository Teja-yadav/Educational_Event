<app-navbar></app-navbar>
<h2 class="page-title">Register For Event</h2>

<div class="card-box">
  <div class="card-header">Event Registration</div>

  <form [formGroup]="itemForm" (ngSubmit)="Submit()" class="register-form">

    <div class="form-group">
      <label>Student ID</label>
      <input type="text" formControlName="studentId" />
    </div>

    <div class="form-group">
      <label>Select Event</label>
      <select formControlName="eventId">
        <option value="">Select Event</option>
        <option *ngFor="let e of eventList" [value]="e.id">
          {{ e.name }}
        </option>
      </select>
      <div class="error" *ngIf="itemForm.controls['eventId'].invalid && itemForm.controls['eventId'].touched">
        Event selection is required
      </div>
    </div>

    <div class="form-group">
      <label>Status</label>
      <input type="text" formControlName="status" />
    </div>

    <button type="submit" class="register-btn">Register</button>

    <div class="success" *ngIf="showMessage">{{ responseMessage }}</div>
    <div class="error" *ngIf="showError">{{ errorMessage }}</div>

  </form>
</div>
