<div class="page">
  <div class="page-header">
    <h1>Register For Event</h1>
    <p>Select an event and complete your registration</p>
  </div>

  <div class="form-card">
    <form [formGroup]="itemForm" (ngSubmit)="Submit()">

      <!-- Student ID -->
      <div class="form-group">
        <label>Student ID</label>
        <input
          type="text"
          formControlName="studentId"
          placeholder="e.g. LTM01"
        />
        <div class="error" *ngIf="itemForm.get('studentId')?.touched && itemForm.get('studentId')?.errors">
          <span *ngIf="itemForm.get('studentId')?.errors?.['required']">
            Student ID is required
          </span>
          <span *ngIf="itemForm.get('studentId')?.errors?.['pattern']">
            Student ID must be like LTM01, LTM09, LTM90
          </span>
        </div>
      </div>

      <!-- Select Event -->
      <div class="form-group">
        <label>Select Event</label>
        <select formControlName="eventId">
          <option value="" >Select Event</option>
          <option *ngFor="let e of eventList" [value]="e.id">
            {{ e.name }} - {{ e.eventDateTime | date:'dd-MMM-yyyy, hh:mm a' }}
          </option>
        </select>
        <div class="error" *ngIf="itemForm.get('eventId')?.touched && itemForm.get('eventId')?.invalid">
          Event selection is required
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="form-actions">
        <button type="submit" class="primary-btn">
          Register
        </button>
        <button type="button" class="secondary-btn" (click)="itemForm.reset()">
          Clear
        </button>
      </div>

      <!-- Messages -->
      <div class="alert error" *ngIf="showError">{{ errorMessage }}</div>
      <div class="alert success" *ngIf="showMessage">{{ responseMessage }}</div>

    </form>
  </div>
</div>
