<div class="container">

  <h2>Register For Event</h2>

  <form [formGroup]="itemForm" (ngSubmit)="Submit()">

    <label>Student ID</label>
    <input type="text" formControlName="studentId" />
    <div class="error" *ngIf="itemForm.controls['studentId'].touched && itemForm.controls['studentId'].invalid">
      Student ID is required
    </div>

    <label>Select Event</label>
    <select formControlName="eventId">
      <option value="">Select Event</option>
      <option *ngFor="let e of eventList" [value]="e.id">{{ e.name }}</option>
    </select>
    <div class="error" *ngIf="itemForm.controls['eventId'].touched && itemForm.controls['eventId'].invalid">
      Event selection is required
    </div>

    <label>Status</label>
    <input type="text" formControlName="status" />
    <div class="error" *ngIf="itemForm.controls['status'].touched && itemForm.controls['status'].invalid">
      Status is required
    </div>

    <button type="submit">Register</button>

    <div *ngIf="showError" class="error">{{ errorMessage }}</div>
    <div *ngIf="showMessage" class="success">{{ responseMessage }}</div>

  </form>

</div>
