<div class="page">
  <div class="page-header">
    <h1>Register For Event</h1>
    <p>Select an event and complete your registration</p>
  </div>

  <div class="form-card">
    <form [formGroup]="itemForm" (ngSubmit)="Submit()">

      <div class="form-group">
        <label>Student Username</label>
        <input
          type="text"
          formControlName="studentId"
          placeholder="Your username"
          readonly
        />
        <div class="error" *ngIf="itemForm.get('studentId')?.touched && itemForm.get('studentId')?.invalid">
          Student Username is required
        </div>
      </div>

      <!-- Select Event -->
      <div class="form-group">
        <label>Select Event</label>
        <select formControlName="eventId">
          <option value="">Select Event</option>
          <option *ngFor="let e of eventList" [value]="e.id">
            {{ e.name }} - {{ e.eventDateTime | date:'dd-MMM-yyyy, hh:mm a' }}
          </option>
        </select>

        <div class="error" *ngIf="itemForm.get('eventId')?.touched && itemForm.get('eventId')?.invalid">
          Event selection is required
        </div>
      </div>

      <div class="form-group">
        <label>Venue</label>
        <input
          type="text"
          formControlName="venue"
          placeholder="Select an event to view venue"
          readonly
        />
      </div>

      <!-- Action Buttons -->
      <div class="form-actions">
        <button type="submit" class="primary-btn">
          Register
        </button>
        <button type="button" class="secondary-btn" (click)="clearForm()">
          Clear
        </button>
      </div>

      <!-- Messages -->
      <div class="alert error" *ngIf="showError">{{ errorMessage }}</div>
      <div class="alert success" *ngIf="showMessage">{{ responseMessage }}</div>

    </form>
  </div>
</div>
