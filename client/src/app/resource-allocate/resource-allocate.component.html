<app-dashboard></app-dashboard>
<h2 class="page-title">Manage Resource Allocation</h2>

<div class="card-container">
  <div class="card-header">Add Resource Allocation</div>

  <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">
    <div class="form-row">

      <!-- Event -->
      <div class="form-group">
        <label>Event</label>
        <select formControlName="eventId">
          <option value="">Select Event</option>
          <option *ngFor="let e of eventList" [value]="e.id">
            {{ e.name }}
          </option>
        </select>
      </div>

      <!-- Resource -->
      <div class="form-group">
        <label>Resource</label>
        <select formControlName="resourceId">
          <option value="">Select Resource</option>
          <option *ngFor="let r of resourceList" [value]="r.id">
            {{ r.resourceType }}
          </option>
        </select>
      </div>

      <!-- Submit -->
      <div class="form-group button-group">
        <button type="submit">Submit</button>
      </div>

    </div>

    <div *ngIf="showError" class="error">{{ errorMessage }}</div>
    <div *ngIf="showMessage" class="success">{{ responseMessage }}</div>
  </form>
</div>
