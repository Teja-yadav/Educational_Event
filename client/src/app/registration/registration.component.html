<div class="auth-page">

  <!-- ✅ BACKGROUND LAYER -->
  <div class="auth-bg"></div>

  <!-- ✅ MAIN LAYOUT -->
  <div class="auth-shell">

    <!-- LEFT SIDE -->
    <div class="auth-left">
      <div class="brand">
        <div class="brand-mark">
          <span class="brand-cap">◆</span>
          <div>
            <div class="brand-name">EduEvent</div>
            <div class="brand-tag">EDUCATIONAL EVENT MANAGEMENT</div>
          </div>
        </div>
      </div>

      <div class="headline">
        Manage. Organize,<br />
        <span class="accent">Elevate Events</span>
      </div>

      <div class="subtext">
        Streamline your college events, engage students, and create unforgettable
        experiences.
      </div>

      <div class="feature-row">
        <div class="feature">
          <div class="feature-title">Event Schedule</div>
        </div>
        <div class="feature">
          <div class="feature-title">Host & Manage</div>
        </div>
        <div class="feature">
          <div class="feature-title">Students</div>
        </div>
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="auth-right">
      <div class="card-glow">
        <div class="auth-card">

          <div class="card-header">
            <div class="card-title">Register</div>
            <div class="card-subtitle">Create your account</div>
          </div>

          <form class="auth-form" [formGroup]="itemForm" (ngSubmit)="onRegister()">

            <div class="field">
              <label class="field-label">Username</label>
              <div class="input-wrap">
                <input class="input" formControlName="username" placeholder="Enter username" />
              </div>
            </div>

            <div class="field">
              <label class="field-label">Password</label>
              <div class="input-wrap">
                <input class="input" type="password" formControlName="password" placeholder="Enter password" />
              </div>
            </div>

            <div class="field">
              <label class="field-label">Role</label>
              <div class="input-wrap">
                <select class="input" formControlName="role">
                  <option value="">Select role</option>
                  <option value="INSTITUTION">Institution</option>
                  <option value="EDUCATOR">Educator</option>
                  <option value="STUDENT">Student</option>
                </select>
              </div>
            </div>

            <div class="field">
              <label class="field-label">Email</label>
              <div class="input-wrap">
                <input class="input" type="email" formControlName="email" placeholder="Enter email" />
              </div>
            </div>

            <button class="btn-primary" type="submit">
              Sign Up →
            </button>

            <div class="register">
              <span class="muted">Already have an account?</span>
              <a routerLink="/login" class="link">Login</a>
            </div>

          </form>

        </div>
      </div>
    </div>

  </div>
</div>
