<app-dashboard></app-dashboard>
<!-- Page Heading -->
<h2 class="page-title">Add Resource</h2>

<!-- Card Container -->
<div class="card-container">
  <div class="card-header">Add Resource</div>

  <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">
    <div class="form-row">

      <div class="form-group">
        <label>Resource Type</label>
        <input type="text" formControlName="resourceType" />
      </div>

      <div class="form-group">
        <label>Description</label>
        <input type="text" formControlName="description" />
      </div>

      <div class="form-group">
        <label>Availability</label>
        <input type="text" formControlName="availability" />
      </div>

      <div class="form-group button-group">
        <button type="submit">Add Resource</button>
      </div>

    </div>

    <div *ngIf="showError" class="error">{{ errorMessage }}</div>
    <div *ngIf="showMessage" class="success">{{ responseMessage }}</div>
  </form>
</div>

<!-- Resource List -->
<div class="card-container">
  <div class="card-header">All Resources</div>

  <table>
    <tr>
      <th>#</th>
      <th>Resource Type</th>
      <th>Description</th>
    </tr>

    <tr *ngFor="let r of resourceList; let i = index">
      <td>{{ i + 1 }}</td>
      <td>{{ r.resourceType }}</td>
      <td>{{ r.description }}</td>
    </tr>
  </table>
</div>
