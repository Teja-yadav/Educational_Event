<h2 class="page-title">Create New Event</h2>
<p class="page-subtitle">Fill in the details to create a new educational event</p>

<!-- CREATE EVENT CARD -->
<div class="event-card">
  <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">

    <div class="field">
      <label>Event Name</label>
      <input formControlName="name" type="text" placeholder="e.g. Advanced Python Workshop" />
    </div>

    <div class="field">
      <label>Description</label>
      <textarea formControlName="description" rows="4"
        placeholder="Describe what this event covers, goals, and target audience..."></textarea>
    </div>

    <div class="field">
      <label>Required Materials / Prerequisites</label>
      <input formControlName="materials" type="text" placeholder="e.g. Laptop, Python 3.x, basic programming knowledge" />
    </div>

    <div class="field">
      <label>Date & Time</label>
      <input type="datetime-local" formControlName="eventDateTime" [min]="minDateTime" />
    </div>

    <div class="actions">
      <button class="btn-primary" type="submit">Create Event</button>
      <button class="btn-secondary" type="button" (click)="itemForm.reset()">Clear</button>
    </div>

    <div *ngIf="showError" class="alert alert-error">{{ errorMessage }}</div>
    <div *ngIf="showMessage" class="alert alert-success">{{ responseMessage }}</div>
  </form>
</div>

<!-- ALL EVENTS -->
<h3 class="section-title">All Events</h3>

<div class="table-card">
  <table class="events-table">
    <thead>
      <tr>
        <th>#</th>
        <th>NAME</th>
        <th>DESCRIPTION</th>
        <th>MATERIALS</th>
        <th>DATE & TIME</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let e of eventList; let i = index">
        <td class="col-id">{{ i + 1 }}</td>
        <td class="col-name">{{ e.name }}</td>
        <td class="col-desc">{{ e.description }}</td>
        <td class="col-mat">{{ e.materials }}</td>
        <td class="col-dt">{{ e.eventDateTime | date:'dd-MM-yyyy, hh:mm a' }}</td>
      </tr>
    </tbody>
  </table>
</div>
