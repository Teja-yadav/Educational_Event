<app-navbar></app-navbar>
<h2 class="page-title">Manage Event</h2>

<div class="card-box">
  <div class="card-header">Create Event</div>

  <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">
    <div class="form-row">

      <div class="form-group">
        <label>Name</label>
        <input formControlName="name" placeholder="name" type="text" />
      </div>

      <div class="form-group">
        <label>Description</label>
        <input formControlName="description" placeholder="description" type="text" />
      </div>

      <div class="form-group">
        <label>Materials</label>
        <input formControlName="materials" placeholder="materials" type="text" />
      </div>

      <div class="form-group">
        <label>Date & Time</label>
        <input type="datetime-local" formControlName="eventDateTime" [min]="minDateTime" />
      </div>

      <div class="form-group btn-group">
        <button type="submit">Submit</button>
      </div>

    </div>

    <div *ngIf="showError" class="error">{{ errorMessage }}</div>
    <div *ngIf="showMessage" class="success">{{ responseMessage }}</div>
  </form>
</div>

<div class="card-box">
  <div class="card-header">Event Information</div>

  <table>
    <thead>
      <tr>
        <th>Sr#</th>
        <th>Name</th>
        <th>Description</th>
        <th>Material</th>
        <th>Date & Time</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let e of eventList; let i = index">
        <td>{{ i + 1 }}</td>
        <td>{{ e.name }}</td>
        <td>{{ e.description }}</td>
        <td>{{ e.materials }}</td>
        <td>{{ e.eventDateTime | date:'dd-MM-yyyy, hh:mm a' }}</td>
      </tr>
    </tbody>
  </table>
</div>
