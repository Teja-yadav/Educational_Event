<div class="fp-card">
  <h2>Forgot Password</h2>

  <form *ngIf="step === 1" [formGroup]="emailForm" (ngSubmit)="sendOtp()">
    <label>Email</label>
    <input formControlName="email" placeholder="Enter registered email" />
    <button type="submit">Send OTP</button>
  </form>

  <form *ngIf="step === 2" [formGroup]="otpForm" (ngSubmit)="verifyOtp()">
    <label>OTP</label>
    <input formControlName="otp" placeholder="Enter 6-digit OTP" />
    <button type="submit">Verify OTP</button>
  </form>

  <form *ngIf="step === 3" [formGroup]="resetForm" (ngSubmit)="resetPassword()">
    <label>New Password</label>
    <input type="password" formControlName="newPassword" placeholder="New password" />

    <label>Confirm Password</label>
    <input type="password" formControlName="confirmPassword" placeholder="Confirm password" />

    <button type="submit">Reset Password</button>
  </form>

  <div class="error" *ngIf="showError">{{ errorMessage }}</div>
  <div class="success" *ngIf="showMessage">{{ responseMessage }}</div>
</div>
